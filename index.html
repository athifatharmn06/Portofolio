<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Athif Portfolio</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body class="bg-gray-50 text-gray-900 dark:bg-dark dark:text-gray-100 font-sans transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
        // Init theme early
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</body>

</html>
